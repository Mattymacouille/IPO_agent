<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO Agent Dashboard</title>
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- SDK Supabase pour récupérer les données -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Configuration PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <!-- Header / Navbar -->
    <header class="border-b border-slate-800 bg-slate-950 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-emerald-400 flex items-center gap-2">
                🤖 IPO Agent <span class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full">PWA</span>
            </h1>
            <button id="installBtn" class="hidden bg-emerald-500 hover:bg-emerald-600 text-slate-950 text-sm font-semibold px-3 py-1.5 rounded-lg transition-all">
                Installer l'App
            </button>
        </div>
    </header>

    <!-- Contenu Principal -->
    <main class="max-w-6xl mx-auto p-4 space-y-6">
        
        <!-- Section Filtres / Stats -->
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                <p class="text-xs text-slate-400 uppercase tracking-wider">Compteur IPO</p>
                <p id="totalIpos" class="text-2xl font-bold text-slate-200">0</p>
            </div>
            <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                <p class="text-xs text-slate-400 uppercase tracking-wider">Alerte Risque Max (9+/10)</p>
                <p id="highRiskCount" class="text-2xl font-bold text-rose-500">0</p>
            </div>
        </div>

        <!-- Zone d'affichage des cartes d'IPO -->
        <h2 class="text-lg font-semibold text-slate-400">Dernières analyses de marché</h2>
        <div id="ipoContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Les cartes générées en JavaScript s'inséreront ici -->
            <div id="loading" class="text-center py-12 text-slate-500 col-span-full">
                Connexion à Supabase et chargement des données...
            </div>
        </div>

    </main>

    <!-- Script de l'application -->
    <script src="app.js"></script>
</body>
</html>
